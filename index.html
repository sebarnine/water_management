<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ระบบ Web GIS จัดการผังน้ำอีสาน</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      height: 55px;
      background: #0b3558;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 55px);
    }

    .sidebar {
      width: 360px;
      background: #f5f7fa;
      border-right: 1px solid #ddd;
      padding: 15px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
      color: #0b3558;
    }

    .sidebar h4 {
      margin: 14px 0 8px;
      color: #0b3558;
      font-size: 15px;
    }

    .layer-box {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .layer-box label {
      cursor: pointer;
      font-size: 15px;
    }

    .layer-box input {
      margin-right: 8px;
    }

    select {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: #0b3558;
      color: white;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #222;
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.4;
    }

    #map {
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="header">
    ระบบสารสนเทศเพื่อการจัดการผังน้ำอีสาน
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>ข้อมูลพื้นฐาน</h3>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="basinToggle" checked />
          ขอบเขตลุ่มน้ำ
        </label>

        <h4>ตัวกรองลุ่มน้ำ</h4>

        <select id="basinSelect">
          <option value="">กำลังโหลดรายชื่อลุ่มน้ำ...</option>
        </select>

        <button class="btn-primary" id="zoomBasinBtn">
          ซูมไปลุ่มน้ำที่เลือก
        </button>

        <button class="btn-secondary" id="showAllBasinBtn">
          แสดงทุกลุ่มน้ำ
        </button>

        <div class="status" id="basinStatus">
          ระบบจะดึงชื่อลุ่มน้ำจาก field RBASIN_NT
        </div>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="provinceToggle" checked />
          ขอบเขตจังหวัด
        </label>

        <h4>ตัวกรองจังหวัด</h4>

        <select id="provinceSelect">
          <option value="">กำลังโหลดรายชื่อจังหวัด...</option>
        </select>

        <button class="btn-primary" id="zoomProvinceBtn">
          ซูมไปจังหวัดที่เลือก
        </button>

        <button class="btn-secondary" id="showAllProvinceBtn">
          แสดงทุกจังหวัด
        </button>

        <div class="status" id="provinceStatus">
          ระบบจะดึงชื่อจังหวัดจาก API อัตโนมัติ
        </div>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          เส้นลำน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          แหล่งน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          พื้นที่ป่าไม้
        </label>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <script>
    // ===============================
    // 1) สร้างแผนที่
    // ===============================
    var map = L.map('map').setView([15.5, 103.5], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // ===============================
    // 2) ตัวแปรกลาง
    // ===============================
    var allBasinData = null;
    var basinFeatureByName = {};

    var allProvinceData = null;
    var provinceFeatureByName = {};

    // ===============================
    // 3) Style ลุ่มน้ำ
    // ===============================
    function basinDefaultStyle() {
      return {
        color: '#d7191c',
        weight: 3,
        opacity: 1,
        fillColor: '#ffffff',
        fillOpacity: 0.08
      };
    }

    function basinSelectedStyle() {
      return {
        color: '#ff9800',
        weight: 5,
        opacity: 1,
        fillColor: '#ffcc80',
        fillOpacity: 0.25
      };
    }

    // ===============================
    // 4) ชั้นข้อมูลขอบเขตลุ่มน้ำ
    // ===============================
    var basinLayer = L.geoJSON(null, {
      style: basinDefaultStyle,

      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};

        var basinThai = getBasinThaiName(props);
        var basinCode = getBasinCode(props);
        var areaInfo = getAreaInfo(feature);

        var popupText =
          '<b>ขอบเขตลุ่มน้ำ</b><br>' +
          '<b>ชื่อลุ่มน้ำภาษาไทย:</b> ' + basinThai + '<br>' +
          '<b>ชื่อ/รหัสลุ่มน้ำ:</b> ' + basinCode + '<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaSqKm + ' ตร.กม.<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaRai + ' ไร่';

        layer.bindPopup(popupText);

        layer.on('click', function () {
          document.getElementById('basinSelect').value = basinThai;
          filterAndZoomToBasin(basinThai);
        });
      }
    });

    // ===============================
    // 5) โหลด basin.geojson
    // ===============================
    fetch('basin.geojson')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('ไม่พบไฟล์ basin.geojson');
        }
        return response.json();
      })
      .then(function (data) {
        allBasinData = data;

        basinLayer.addData(allBasinData);
        basinLayer.addTo(map);

        buildBasinSelect(allBasinData);

        document.getElementById('basinStatus').innerHTML =
          'โหลดรายชื่อลุ่มน้ำสำเร็จ ' + allBasinData.features.length + ' รายการ';

        if (basinLayer.getBounds().isValid()) {
          map.fitBounds(basinLayer.getBounds(), {
            padding: [30, 30]
          });
        }
      })
      .catch(function (error) {
        console.error('โหลด basin.geojson ไม่สำเร็จ:', error);
        document.getElementById('basinStatus').innerHTML =
          'โหลดข้อมูลลุ่มน้ำไม่สำเร็จ กรุณาตรวจสอบไฟล์ basin.geojson';
      });

    // ===============================
    // 6) อ่านชื่อลุ่มน้ำภาษาไทยจาก RBASIN_NT
    // ===============================
    function getBasinThaiName(props) {
      return (
        props.RBASIN_NT ||
        props.rbasin_nt ||
        props.RBASIN_NAME ||
        props.basin_name ||
        props.name ||
        props.NAME ||
        'ไม่ทราบชื่อลุ่มน้ำ'
      );
    }

    // ===============================
    // 7) อ่านชื่อ/รหัสลุ่มน้ำเพิ่มเติม
    // ===============================
    function getBasinCode(props) {
      return (
        props.FIRST_RBAS ||
        props.FIRST_BAS ||
        props.RBASIN_CODE ||
        props.BASIN_CODE ||
        props.code ||
        props.CODE ||
        '-'
      );
    }

    // ===============================
    // 8) คำนวณเนื้อที่
    // ===============================
    function getAreaInfo(feature) {
      var props = feature.properties || {};

      var areaFromField =
        props.area ||
        props.AREA ||
        props.Area ||
        props.Shape_Area ||
        props.Shape__Area ||
        props.SHAPE_Area ||
        props['เนื้อที่'];

      var areaSqKm = 0;

      if (areaFromField && !isNaN(Number(areaFromField))) {
        var value = Number(areaFromField);

        if (value > 1000000) {
          areaSqKm = value / 1000000;
        } else {
          areaSqKm = value;
        }
      } else {
        var areaSqMeter = turf.area(feature);
        areaSqKm = areaSqMeter / 1000000;
      }

      var areaRai = areaSqKm * 625;

      return {
        areaSqKm: areaSqKm.toLocaleString('th-TH', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }),
        areaRai: areaRai.toLocaleString('th-TH', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        })
      };
    }

    // ===============================
    // 9) สร้างตัวกรองลุ่มน้ำ
    // ===============================
    function buildBasinSelect(data) {
      var select = document.getElementById('basinSelect');
      select.innerHTML = '';

      var defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = '-- เลือกลุ่มน้ำ --';
      select.appendChild(defaultOption);

      var basinNames = [];

      data.features.forEach(function (feature) {
        var props = feature.properties || {};
        var basinThai = getBasinThaiName(props);

        if (
          basinThai &&
          basinThai !== 'ไม่ทราบชื่อลุ่มน้ำ' &&
          basinNames.indexOf(basinThai) === -1
        ) {
          basinNames.push(basinThai);
          basinFeatureByName[basinThai] = feature;
        }
      });

      basinNames.sort(function (a, b) {
        return a.localeCompare(b, 'th');
      });

      basinNames.forEach(function (basinThai) {
        var option = document.createElement('option');
        option.value = basinThai;
        option.textContent = basinThai;
        select.appendChild(option);
      });
    }

    // ===============================
    // 10) เลือกลุ่มน้ำแล้วซูม
    // ===============================
    function filterAndZoomToBasin(basinThai) {
      if (!basinThai || !basinFeatureByName[basinThai]) {
        return;
      }

      var selectedFeature = basinFeatureByName[basinThai];

      basinLayer.clearLayers();

      var selectedLayer = L.geoJSON(selectedFeature, {
        style: basinSelectedStyle,

        onEachFeature: function (feature, layer) {
          var props = feature.properties || {};

          var basinThai = getBasinThaiName(props);
          var basinCode = getBasinCode(props);
          var areaInfo = getAreaInfo(feature);

          layer.bindPopup(
            '<b>ขอบเขตลุ่มน้ำ</b><br>' +
            '<b>ชื่อลุ่มน้ำภาษาไทย:</b> ' + basinThai + '<br>' +
            '<b>ชื่อ/รหัสลุ่มน้ำ:</b> ' + basinCode + '<br>' +
            '<b>เนื้อที่:</b> ' + areaInfo.areaSqKm + ' ตร.กม.<br>' +
            '<b>เนื้อที่:</b> ' + areaInfo.areaRai + ' ไร่'
          );

          layer.on('click', function () {
            layer.openPopup();
          });
        }
      });

      selectedLayer.eachLayer(function (layer) {
        basinLayer.addLayer(layer);
      });

      if (document.getElementById('basinToggle').checked) {
        basinLayer.addTo(map);
      }

      if (selectedLayer.getBounds().isValid()) {
        map.fitBounds(selectedLayer.getBounds(), {
          padding: [30, 30]
        });
      }

      var areaInfo = getAreaInfo(selectedFeature);

      document.getElementById('basinStatus').innerHTML =
        'กำลังแสดงลุ่มน้ำ ' + basinThai +
        '<br>เนื้อที่ ' + areaInfo.areaSqKm + ' ตร.กม.';
    }

    // ===============================
    // 11) แสดงทุกลุ่มน้ำ
    // ===============================
    function showAllBasins() {
      if (!allBasinData) {
        return;
      }

      basinLayer.clearLayers();
      basinLayer.addData(allBasinData);

      document.getElementById('basinSelect').value = '';

      if (document.getElementById('basinToggle').checked) {
        basinLayer.addTo(map);
      }

      if (basinLayer.getBounds().isValid()) {
        map.fitBounds(basinLayer.getBounds(), {
          padding: [30, 30]
        });
      }

      document.getElementById('basinStatus').innerHTML =
        'แสดงทุกลุ่มน้ำ';
    }

    // ===============================
    // 12) API จังหวัด
    // ===============================
    var provinceApiUrl =
      'https://services1.arcgis.com/jSaRWj2TDlcN1zOC/arcgis/rest/services/Thailand_Province_Boundaries_view/FeatureServer/1/query?' +
      'where=1%3D1&' +
      'outFields=*&' +
      'returnGeometry=true&' +
      'outSR=4326&' +
      'f=geojson';

    // ===============================
    // 13) ชั้นข้อมูลจังหวัด
    // ===============================
    var provinceLayer = L.geoJSON(null, {
      style: function () {
        return {
          color: '#6a1b9a',
          weight: 2,
          opacity: 1,
          fillColor: '#ffffff',
          fillOpacity: 0
        };
      },

      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};

        var provinceThai = getProvinceThaiName(props);
        var provinceEnglish = getProvinceEnglishName(props);
        var provinceCode = getProvinceCode(props);
        var areaInfo = getAreaInfo(feature);

        var popupText =
          '<b>ขอบเขตจังหวัด</b><br>' +
          '<b>ชื่อจังหวัด:</b> ' + provinceThai + '<br>' +
          '<b>ชื่ออังกฤษ:</b> ' + provinceEnglish + '<br>' +
          '<b>รหัสจังหวัด:</b> ' + provinceCode + '<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaSqKm + ' ตร.กม.<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaRai + ' ไร่';

        layer.bindPopup(popupText);

        layer.on('click', function () {
          document.getElementById('provinceSelect').value = provinceThai;
          filterAndZoomToProvince(provinceThai);
        });
      }
    });

    // ===============================
    // 14) โหลดข้อมูลจังหวัด
    // ===============================
    fetch(provinceApiUrl)
      .then(function (response) {
        if (!response.ok) {
          throw new Error('โหลดข้อมูลจังหวัดจาก API ไม่สำเร็จ');
        }
        return response.json();
      })
      .then(function (data) {
        allProvinceData = data;

        provinceLayer.addData(allProvinceData);
        provinceLayer.addTo(map);

        buildProvinceSelect(allProvinceData);

        document.getElementById('provinceStatus').innerHTML =
          'โหลดรายชื่อจังหวัดสำเร็จ ' + allProvinceData.features.length + ' จังหวัด';
      })
      .catch(function (error) {
        console.error('โหลดข้อมูลจังหวัดไม่สำเร็จ:', error);
        document.getElementById('provinceStatus').innerHTML =
          'โหลดข้อมูลจังหวัดไม่สำเร็จ กรุณาตรวจสอบ API';
      });

    function getProvinceThaiName(props) {
      return (
        props['ชื่อจังหวัดภาษาไทย'] ||
        props.PROV_NAMT ||
        props.PROV_NAME_TH ||
        props.PROV_TH ||
        props.PV_NAME_TH ||
        props.ADM1_TH ||
        props.ADM1_TH_NAME ||
        props.CHANGWAT_T ||
        props.NAME_TH ||
        props.NAME_THAI ||
        props.name_th ||
        props.name ||
        'ไม่ทราบชื่อจังหวัด'
      );
    }

    function getProvinceEnglishName(props) {
      return (
        props['ชื่อจังหวัดภาษาอังกฤษ'] ||
        props.PROV_NAME ||
        props.PROV_NAME_EN ||
        props.PROV_EN ||
        props.PV_NAME_EN ||
        props.ADM1_EN ||
        props.ADM1_EN_NAME ||
        props.CHANGWAT_E ||
        props.NAME_EN ||
        props.NAME_ENG ||
        props.name_en ||
        '-'
      );
    }

    function getProvinceCode(props) {
      return (
        props['รหัสจังหวัด'] ||
        props.PROV_CODE ||
        props.PV_CODE ||
        props.ADM1_PCODE ||
        props.CHANGWAT_C ||
        props.CODE ||
        props.code ||
        '-'
      );
    }

    function buildProvinceSelect(data) {
      var select = document.getElementById('provinceSelect');
      select.innerHTML = '';

      var defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = '-- เลือกจังหวัด --';
      select.appendChild(defaultOption);

      var provinceNames = [];

      data.features.forEach(function (feature) {
        var props = feature.properties || {};
        var provinceThai = getProvinceThaiName(props);

        if (
          provinceThai &&
          provinceThai !== 'ไม่ทราบชื่อจังหวัด' &&
          provinceNames.indexOf(provinceThai) === -1
        ) {
          provinceNames.push(provinceThai);
          provinceFeatureByName[provinceThai] = feature;
        }
      });

      provinceNames.sort(function (a, b) {
        return a.localeCompare(b, 'th');
      });

      provinceNames.forEach(function (provinceThai) {
        var option = document.createElement('option');
        option.value = provinceThai;
        option.textContent = provinceThai;
        select.appendChild(option);
      });
    }

    function filterAndZoomToProvince(provinceThai) {
      if (!provinceThai || !provinceFeatureByName[provinceThai]) {
        return;
      }

      var selectedFeature = provinceFeatureByName[provinceThai];

      provinceLayer.clearLayers();
      provinceLayer.addData(selectedFeature);

      if (document.getElementById('provinceToggle').checked) {
        provinceLayer.addTo(map);
      }

      var tempLayer = L.geoJSON(selectedFeature);

      if (tempLayer.getBounds().isValid()) {
        map.fitBounds(tempLayer.getBounds(), {
          padding: [30, 30]
        });
      }

      var areaInfo = getAreaInfo(selectedFeature);

      document.getElementById('provinceStatus').innerHTML =
        'กำลังแสดงจังหวัด ' + provinceThai +
        '<br>เนื้อที่ ' + areaInfo.areaSqKm + ' ตร.กม.';
    }

    function showAllProvinces() {
      if (!allProvinceData) {
        return;
      }

      provinceLayer.clearLayers();
      provinceLayer.addData(allProvinceData);

      document.getElementById('provinceSelect').value = '';

      if (document.getElementById('provinceToggle').checked) {
        provinceLayer.addTo(map);
      }

      if (provinceLayer.getBounds().isValid()) {
        map.fitBounds(provinceLayer.getBounds(), {
          padding: [30, 30]
        });
      }

      document.getElementById('provinceStatus').innerHTML =
        'แสดงทุกจังหวัด';
    }

    // ===============================
    // 15) Event เปิด-ปิด layer และตัวกรอง
    // ===============================
    document.getElementById('basinToggle').addEventListener('change', function () {
      if (this.checked) {
        basinLayer.addTo(map);
      } else {
        map.removeLayer(basinLayer);
      }
    });

    document.getElementById('basinSelect').addEventListener('change', function () {
      filterAndZoomToBasin(this.value);
    });

    document.getElementById('zoomBasinBtn').addEventListener('click', function () {
      var basinThai = document.getElementById('basinSelect').value;
      filterAndZoomToBasin(basinThai);
    });

    document.getElementById('showAllBasinBtn').addEventListener('click', function () {
      showAllBasins();
    });

    document.getElementById('provinceToggle').addEventListener('change', function () {
      if (this.checked) {
        provinceLayer.addTo(map);
      } else {
        map.removeLayer(provinceLayer);
      }
    });

    document.getElementById('provinceSelect').addEventListener('change', function () {
      filterAndZoomToProvince(this.value);
    });

    document.getElementById('zoomProvinceBtn').addEventListener('click', function () {
      var provinceThai = document.getElementById('provinceSelect').value;
      filterAndZoomToProvince(provinceThai);
    });

    document.getElementById('showAllProvinceBtn').addEventListener('click', function () {
      showAllProvinces();
    });

    // ===============================
    // 16) Layer Control บนแผนที่
    // ===============================
    var overlayMaps = {
      'ขอบเขตลุ่มน้ำ': basinLayer,
      'ขอบเขตจังหวัด': provinceLayer
    };

    L.control.layers(null, overlayMaps, {
      collapsed: false
    }).addTo(map);
  </script>
</body>
</html>
