<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ระบบ Web GIS จัดการผังน้ำอีสาน</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      height: 55px;
      background: #0b3558;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 55px);
    }

    .sidebar {
      width: 300px;
      background: #f5f7fa;
      border-right: 1px solid #ddd;
      padding: 15px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
      color: #0b3558;
    }

    .layer-box {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    #map {
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="header">
    ระบบสารสนเทศเพื่อการจัดการผังน้ำอีสาน
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>ข้อมูลพื้นฐาน</h3>

      <div class="layer-box">
        <label>
          <input type="checkbox" checked />
          ขอบเขตลุ่มน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" checked />
          เส้นลำน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" />
          แหล่งน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" />
          พื้นที่ป่าไม้
        </label>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  var map = L.map('map').setView([15.5, 103.5], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ชั้นข้อมูลขอบเขตลุ่มน้ำจากไฟล์ basin.geojson
  var basinLayer = L.geoJSON(null, {
    style: {
      color: '#d7191c',
      weight: 3,
      fillColor: '#ffffff',
      fillOpacity: 0.08
    },
    onEachFeature: function (feature, layer) {
      var name =
        feature.properties.name ||
        feature.properties.NAME ||
        feature.properties.Name ||
        feature.properties.basin_name ||
        'ขอบเขตลุ่มน้ำ';

      layer.bindPopup('<b>ขอบเขตลุ่มน้ำ</b><br>' + name);
    }
  });

  fetch('basin.geojson')
    .then(response => response.json())
    .then(data => {
      basinLayer.addData(data);
      basinLayer.addTo(map);

      if (basinLayer.getBounds().isValid()) {
        map.fitBounds(basinLayer.getBounds());
      }
    })
    .catch(error => {
      console.error('โหลดไฟล์ basin.geojson ไม่สำเร็จ:', error);
      alert('โหลดไฟล์ basin.geojson ไม่สำเร็จ กรุณาตรวจสอบชื่อไฟล์');
    });

  // ปุ่มเปิด-ปิดชั้นข้อมูลบนแผนที่
  var overlayMaps = {
    'ขอบเขตลุ่มน้ำ': basinLayer
  };

  L.control.layers(null, overlayMaps, {
    collapsed: false
  }).addTo(map);
</script>
  </script>
</body>
</html>
