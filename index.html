<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ระบบ Web GIS จัดการผังน้ำอีสาน</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      height: 55px;
      background: #0b3558;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 55px);
    }

    .sidebar {
      width: 300px;
      background: #f5f7fa;
      border-right: 1px solid #ddd;
      padding: 15px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
      color: #0b3558;
    }

    .layer-box {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .layer-box label {
      cursor: pointer;
      font-size: 15px;
    }

    .layer-box input {
      margin-right: 8px;
    }

    #map {
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="header">
    ระบบสารสนเทศเพื่อการจัดการผังน้ำอีสาน
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>ข้อมูลพื้นฐาน</h3>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="basinToggle" checked />
          ขอบเขตลุ่มน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="provinceToggle" />
          ขอบเขตจังหวัด
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          เส้นลำน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          แหล่งน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          พื้นที่ป่าไม้
        </label>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Esri Leaflet สำหรับดึง ArcGIS FeatureServer -->
  <script src="https://unpkg.com/esri-leaflet/dist/esri-leaflet.js"></script>

  <script>
    // ===============================
    // 1) สร้างแผนที่
    // ===============================
    var map = L.map('map').setView([15.5, 103.5], 7);

    // ===============================
    // 2) แผนที่ฐาน OpenStreetMap
    // ===============================
    var baseMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // ===============================
    // 3) ชั้นข้อมูลขอบเขตลุ่มน้ำ จาก basin.geojson
    // ===============================
    var basinLayer = L.geoJSON(null, {
      style: {
        color: '#d7191c',
        weight: 3,
        opacity: 1,
        fillColor: '#ffffff',
        fillOpacity: 0.08
      },
      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};

        var name =
          props.RBASIN_NT ||
          props.FIRST_RBAS ||
          props.name ||
          props.NAME ||
          props.Name ||
          props.basin_name ||
          props.BASIN_NAME ||
          props.Subbasin ||
          props.SUBBASIN ||
          'ขอบเขตลุ่มน้ำ';

        layer.bindPopup('<b>ขอบเขตลุ่มน้ำ</b><br>' + name);
      }
    });

    fetch('basin.geojson')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('ไม่พบไฟล์ basin.geojson');
        }
        return response.json();
      })
      .then(function (data) {
        basinLayer.addData(data);
        basinLayer.addTo(map);

        if (basinLayer.getBounds().isValid()) {
          map.fitBounds(basinLayer.getBounds());
        }
      })
      .catch(function (error) {
        console.error('โหลดไฟล์ basin.geojson ไม่สำเร็จ:', error);
        alert('โหลดไฟล์ basin.geojson ไม่สำเร็จ กรุณาตรวจสอบชื่อไฟล์และตำแหน่งไฟล์');
      });

    // ===============================
    // 4) ชั้นข้อมูลขอบเขตจังหวัด จาก ArcGIS FeatureServer
    // ===============================
    var provinceLayer = L.esri.featureLayer({
      url: 'https://services1.arcgis.com/jSaRWj2TDlcN1zOC/arcgis/rest/services/Thailand_Province_Boundaries_view/FeatureServer/1',

      style: function () {
        return {
          color: '#6a1b9a',
          weight: 2,
          opacity: 1,
          fillColor: '#ffffff',
          fillOpacity: 0
        };
      },

      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};

        var name =
          props.ADM1_TH ||
          props.ADM1_EN ||
          props.PROV_NAMT ||
          props.PROV_NAME ||
          props.NAME_1 ||
          props.NAME ||
          props.name ||
          props.Province ||
          props.province ||
          'จังหวัด';

        layer.bindPopup('<b>ขอบเขตจังหวัด</b><br>' + name);
      }
    });

    // ===============================
    // 5) เปิด-ปิดชั้นข้อมูลจากเมนูด้านซ้าย
    // ===============================
    document.getElementById('basinToggle').addEventListener('change', function () {
      if (this.checked) {
        basinLayer.addTo(map);
      } else {
        map.removeLayer(basinLayer);
      }
    });

    document.getElementById('provinceToggle').addEventListener('change', function () {
      if (this.checked) {
        provinceLayer.addTo(map);
      } else {
        map.removeLayer(provinceLayer);
      }
    });

    // ===============================
    // 6) ปุ่ม Layer Control บนแผนที่
    // ===============================
    var overlayMaps = {
      'ขอบเขตลุ่มน้ำ': basinLayer,
      'ขอบเขตจังหวัด': provinceLayer
    };

    L.control.layers(null, overlayMaps, {
      collapsed: false
    }).addTo(map);
  </script>
</body>
</html>
