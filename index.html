<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ระบบ Web GIS จัดการผังน้ำอีสาน</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      height: 55px;
      background: #0b3558;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 55px);
    }

    .sidebar {
      width: 370px;
      background: #f5f7fa;
      border-right: 1px solid #ddd;
      padding: 15px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
      color: #0b3558;
    }

    .sidebar h4 {
      margin: 14px 0 8px;
      color: #0b3558;
      font-size: 15px;
    }

    .layer-box {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .layer-box label {
      cursor: pointer;
      font-size: 15px;
    }

    .layer-box input {
      margin-right: 8px;
    }

    select {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 9px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: #0b3558;
      color: white;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #222;
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.4;
    }

    #map {
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="header">
    ระบบสารสนเทศเพื่อการจัดการผังน้ำอีสาน
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>ข้อมูลพื้นฐาน</h3>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="basinToggle" checked />
          ขอบเขตลุ่มน้ำหลัก
        </label>

        <h4>ตัวกรองลุ่มน้ำ</h4>

        <select id="basinSelect">
          <option value="">กำลังโหลดรายชื่อลุ่มน้ำ...</option>
        </select>

        <button class="btn-primary" id="zoomBasinBtn">
          ซูมไปลุ่มน้ำที่เลือก
        </button>

        <button class="btn-secondary" id="showAllBasinBtn">
          แสดงทุกลุ่มน้ำ
        </button>

        <div class="status" id="basinStatus">
          ดึงชื่อลุ่มน้ำจาก field RBASIN_NT
        </div>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="subBasinToggle" />
          ขอบเขตลุ่มน้ำย่อย
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="provinceToggle" />
          ขอบเขตจังหวัด
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="factoryToggle" />
          โรงงานอุตสาหกรรม
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="riverToggle" />
          เส้นลำน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="waterbodyToggle" />
          แหล่งน้ำ / อุทกวิทยา
        </label>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Turf สำหรับคำนวณพื้นที่ -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <!-- Esri Leaflet + Esri Vector สำหรับ ArcGIS VectorTileServer -->
  <script src="https://unpkg.com/esri-leaflet/dist/esri-leaflet.js"></script>
  <script src="https://unpkg.com/esri-leaflet-vector/dist/esri-leaflet-vector.js"></script>

  <script>
    // ===============================
    // 1) สร้างแผนที่
    // ===============================
    var map = L.map('map').setView([15.5, 103.5], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // ===============================
    // 2) ตัวแปรกลาง
    // ===============================
    var allBasinData = null;
    var basinFeatureByName = {};

    // ===============================
    // 3) ฟังก์ชันทั่วไป
    // ===============================
    function getAreaInfo(feature) {
      var props = feature.properties || {};

      var areaFromField =
        props.area ||
        props.AREA ||
        props.Area ||
        props.Shape_Area ||
        props.Shape__Area ||
        props.SHAPE_Area ||
        props['เนื้อที่'];

      var areaSqKm = 0;

      if (areaFromField && !isNaN(Number(areaFromField))) {
        var value = Number(areaFromField);

        if (value > 1000000) {
          areaSqKm = value / 1000000;
        } else {
          areaSqKm = value;
        }
      } else {
        try {
          var areaSqMeter = turf.area(feature);
          areaSqKm = areaSqMeter / 1000000;
        } catch (e) {
          areaSqKm = 0;
        }
      }

      var areaRai = areaSqKm * 625;

      return {
        areaSqKm: areaSqKm.toLocaleString('th-TH', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }),
        areaRai: areaRai.toLocaleString('th-TH', {
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        })
      };
    }

    function popupFromProperties(props) {
      var html = '';

      Object.keys(props).slice(0, 12).forEach(function (key) {
        html += '<b>' + key + ':</b> ' + props[key] + '<br>';
      });

      return html;
    }

    // ===============================
    // 4) ขอบเขตลุ่มน้ำหลัก basin.geojson
    // ===============================
    function basinDefaultStyle() {
      return {
        color: '#d7191c',
        weight: 3,
        opacity: 1,
        fillColor: '#ffffff',
        fillOpacity: 0.08
      };
    }

    function basinSelectedStyle() {
      return {
        color: '#ff9800',
        weight: 5,
        opacity: 1,
        fillColor: '#ffcc80',
        fillOpacity: 0.25
      };
    }

    function getBasinThaiName(props) {
      return (
        props.RBASIN_NT ||
        props.rbasin_nt ||
        props.RBASIN_NAME ||
        props.basin_name ||
        props.name ||
        props.NAME ||
        'ไม่ทราบชื่อลุ่มน้ำ'
      );
    }

    function getBasinCode(props) {
      return (
        props.FIRST_RBAS ||
        props.FIRST_BAS ||
        props.RBASIN_CODE ||
        props.BASIN_CODE ||
        props.code ||
        props.CODE ||
        '-'
      );
    }

    var basinLayer = L.geoJSON(null, {
      style: basinDefaultStyle,

      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};
        var basinThai = getBasinThaiName(props);
        var basinCode = getBasinCode(props);
        var areaInfo = getAreaInfo(feature);

        var popupText =
          '<b>ขอบเขตลุ่มน้ำหลัก</b><br>' +
          '<b>ชื่อลุ่มน้ำภาษาไทย:</b> ' + basinThai + '<br>' +
          '<b>ชื่อ/รหัสลุ่มน้ำ:</b> ' + basinCode + '<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaSqKm + ' ตร.กม.<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaRai + ' ไร่';

        layer.bindPopup(popupText);

        layer.on('click', function () {
          document.getElementById('basinSelect').value = basinThai;
          filterAndZoomToBasin(basinThai);
          layer.openPopup();
        });
      }
    });

    fetch('basin.geojson')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('ไม่พบไฟล์ basin.geojson');
        }
        return response.json();
      })
      .then(function (data) {
        allBasinData = data;

        basinLayer.addData(allBasinData);
        basinLayer.addTo(map);

        buildBasinSelect(allBasinData);

        document.getElementById('basinStatus').innerHTML =
          'โหลดรายชื่อลุ่มน้ำสำเร็จ ' + allBasinData.features.length + ' รายการ';

        if (basinLayer.getBounds().isValid()) {
          map.fitBounds(basinLayer.getBounds(), {
            padding: [30, 30]
          });
        }
      })
      .catch(function (error) {
        console.error('โหลด basin.geojson ไม่สำเร็จ:', error);
        document.getElementById('basinStatus').innerHTML =
          'โหลดข้อมูลลุ่มน้ำไม่สำเร็จ';
      });

    function buildBasinSelect(data) {
      var select = document.getElementById('basinSelect');
      select.innerHTML = '';

      var defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = '-- เลือกลุ่มน้ำ --';
      select.appendChild(defaultOption);

      var basinNames = [];

      data.features.forEach(function (feature) {
        var props = feature.properties || {};
        var basinThai = getBasinThaiName(props);

        if (
          basinThai &&
          basinThai !== 'ไม่ทราบชื่อลุ่มน้ำ' &&
          basinNames.indexOf(basinThai) === -1
        ) {
          basinNames.push(basinThai);
          basinFeatureByName[basinThai] = feature;
        }
      });

      basinNames.sort(function (a, b) {
        return a.localeCompare(b, 'th');
      });

      basinNames.forEach(function (basinThai) {
        var option = document.createElement('option');
        option.value = basinThai;
        option.textContent = basinThai;
        select.appendChild(option);
      });
    }

    function filterAndZoomToBasin(basinThai) {
      if (!basinThai || !basinFeatureByName[basinThai]) {
        return;
      }

      var selectedFeature = basinFeatureByName[basinThai];

      basinLayer.clearLayers();

      var selectedLayer = L.geoJSON(selectedFeature, {
        style: basinSelectedStyle,

        onEachFeature: function (feature, layer) {
          var props = feature.properties || {};
          var basinThai = getBasinThaiName(props);
          var basinCode = getBasinCode(props);
          var areaInfo = getAreaInfo(feature);

          layer.bindPopup(
            '<b>ขอบเขตลุ่มน้ำหลัก</b><br>' +
            '<b>ชื่อลุ่มน้ำภาษาไทย:</b> ' + basinThai + '<br>' +
            '<b>ชื่อ/รหัสลุ่มน้ำ:</b> ' + basinCode + '<br>' +
            '<b>เนื้อที่:</b> ' + areaInfo.areaSqKm + ' ตร.กม.<br>' +
            '<b>เนื้อที่:</b> ' + areaInfo.areaRai + ' ไร่'
          );
        }
      });

      selectedLayer.eachLayer(function (layer) {
        basinLayer.addLayer(layer);
      });

      if (document.getElementById('basinToggle').checked) {
        basinLayer.addTo(map);
      }

      if (selectedLayer.getBounds().isValid()) {
        map.fitBounds(selectedLayer.getBounds(), {
          padding: [30, 30]
        });
      }

      var areaInfo = getAreaInfo(selectedFeature);

      document.getElementById('basinStatus').innerHTML =
        'กำลังแสดงลุ่มน้ำ ' + basinThai +
        '<br>เนื้อที่ ' + areaInfo.areaSqKm + ' ตร.กม.';
    }

    function showAllBasins() {
      if (!allBasinData) {
        return;
      }

      basinLayer.clearLayers();
      basinLayer.addData(allBasinData);

      document.getElementById('basinSelect').value = '';

      if (document.getElementById('basinToggle').checked) {
        basinLayer.addTo(map);
      }

      if (basinLayer.getBounds().isValid()) {
        map.fitBounds(basinLayer.getBounds(), {
          padding: [30, 30]
        });
      }

      document.getElementById('basinStatus').innerHTML =
        'แสดงทุกลุ่มน้ำ';
    }

    // ===============================
    // 5) ขอบเขตลุ่มน้ำย่อย sub_basin.geojson
    // ===============================
    var subBasinLayer = L.geoJSON(null, {
      style: {
        color: '#00796b',
        weight: 2,
        opacity: 1,
        fillColor: '#80cbc4',
        fillOpacity: 0.12
      },
      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};
        var areaInfo = getAreaInfo(feature);

        var name =
          props.SUB_BASIN ||
          props.SUBBASIN ||
          props.sub_basin ||
          props.NAME ||
          props.name ||
          props.RBASIN_NT ||
          'ลุ่มน้ำย่อย';

        var popupText =
          '<b>ขอบเขตลุ่มน้ำย่อย</b><br>' +
          '<b>ชื่อ:</b> ' + name + '<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaSqKm + ' ตร.กม.<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaRai + ' ไร่';

        layer.bindPopup(popupText);
      }
    });

    fetch('sub_basin.geojson')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('ไม่พบไฟล์ sub_basin.geojson');
        }
        return response.json();
      })
      .then(function (data) {
        subBasinLayer.addData(data);
      })
      .catch(function (error) {
        console.error('โหลด sub_basin.geojson ไม่สำเร็จ:', error);
      });

    // ===============================
    // 6) ขอบเขตจังหวัด Thailand Province Boundaries.geojson
    // ===============================
    var provinceLayer = L.geoJSON(null, {
      style: {
        color: '#6a1b9a',
        weight: 2,
        opacity: 1,
        fillColor: '#ffffff',
        fillOpacity: 0
      },
      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};
        var areaInfo = getAreaInfo(feature);

        var nameThai =
          props['ชื่อจังหวัดภาษาไทย'] ||
          props.PROV_NAMT ||
          props.ADM1_TH ||
          props.CHANGWAT_T ||
          props.NAME_TH ||
          props.name ||
          'จังหวัด';

        var nameEng =
          props['ชื่อจังหวัดภาษาอังกฤษ'] ||
          props.PROV_NAME ||
          props.ADM1_EN ||
          props.CHANGWAT_E ||
          props.NAME_EN ||
          '-';

        var popupText =
          '<b>ขอบเขตจังหวัด</b><br>' +
          '<b>ชื่อจังหวัด:</b> ' + nameThai + '<br>' +
          '<b>ชื่ออังกฤษ:</b> ' + nameEng + '<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaSqKm + ' ตร.กม.<br>' +
          '<b>เนื้อที่:</b> ' + areaInfo.areaRai + ' ไร่';

        layer.bindPopup(popupText);
      }
    });

    fetch('Thailand%20Province%20Boundaries.geojson')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('ไม่พบไฟล์ Thailand Province Boundaries.geojson');
        }
        return response.json();
      })
      .then(function (data) {
        provinceLayer.addData(data);
      })
      .catch(function (error) {
        console.error('โหลด Thailand Province Boundaries.geojson ไม่สำเร็จ:', error);
      });

    // ===============================
    // 7) โรงงาน Factory_TH.geojson
    // ===============================
    var factoryLayer = L.geoJSON(null, {
      pointToLayer: function (feature, latlng) {
        return L.circleMarker(latlng, {
          radius: 5,
          color: '#e65100',
          weight: 1,
          fillColor: '#ff9800',
          fillOpacity: 0.85
        });
      },

      style: {
        color: '#e65100',
        weight: 1,
        fillColor: '#ff9800',
        fillOpacity: 0.6
      },

      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};

        var name =
          props.NAME ||
          props.name ||
          props.FACTORY_NAME ||
          props.factory_name ||
          props['ชื่อโรงงาน'] ||
          'โรงงานอุตสาหกรรม';

        var popupText =
          '<b>โรงงานอุตสาหกรรม</b><br>' +
          '<b>ชื่อ:</b> ' + name + '<br>' +
          popupFromProperties(props);

        layer.bindPopup(popupText);
      }
    });

    fetch('Factory_TH.geojson')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('ไม่พบไฟล์ Factory_TH.geojson');
        }
        return response.json();
      })
      .then(function (data) {
        factoryLayer.addData(data);
      })
      .catch(function (error) {
        console.error('โหลด Factory_TH.geojson ไม่สำเร็จ:', error);
      });

    // ===============================
    // 8) เส้นลำน้ำ จาก ArcGIS FeatureServer
    // ===============================
    var riverLayer = L.geoJSON(null, {
      style: {
        color: '#0066ff',
        weight: 2,
        opacity: 0.9
      },

      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};

        var name =
          props.NAME ||
          props.name ||
          props.RIVER_NAME ||
          props.river_name ||
          props.WATER_NAME ||
          props.water_name ||
          props['ชื่อลำน้ำ'] ||
          props['ชื่อแม่น้ำ'] ||
          'เส้นลำน้ำ';

        var popupText =
          '<b>เส้นลำน้ำ</b><br>' +
          '<b>ชื่อ:</b> ' + name + '<br>' +
          popupFromProperties(props);

        layer.bindPopup(popupText);
      }
    });

    var riverApiUrl =
      'https://gistdaportal.gistda.or.th/arcgis/rest/services/Hosted/%E0%B8%97%E0%B8%B2%E0%B8%87%E0%B8%99%E0%B9%89%E0%B8%B3%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%80%E0%B8%97%E0%B8%A8%E0%B9%84%E0%B8%97%E0%B8%A2/FeatureServer/0/query?' +
      'where=1%3D1&' +
      'outFields=*&' +
      'returnGeometry=true&' +
      'outSR=4326&' +
      'f=geojson';

    fetch(riverApiUrl)
      .then(function (response) {
        if (!response.ok) {
          throw new Error('โหลดเส้นลำน้ำไม่สำเร็จ');
        }
        return response.json();
      })
      .then(function (data) {
        riverLayer.addData(data);
      })
      .catch(function (error) {
        console.error('โหลดเส้นลำน้ำไม่สำเร็จ:', error);
      });

    // ===============================
    // 9) แหล่งน้ำ / อุทกวิทยา จาก ArcGIS VectorTileServer
    // ===============================
    var waterbodyLayer = L.esri.Vector.vectorTileLayer(
      'https://tiles.arcgis.com/tiles/jSaRWj2TDlcN1zOC/arcgis/rest/services/Thailand_Hydrology/VectorTileServer',
      {
        opacity: 0.9
      }
    );

    // ===============================
    // 10) Event เปิด-ปิด Layer
    // ===============================
    document.getElementById('basinToggle').addEventListener('change', function () {
      if (this.checked) {
        basinLayer.addTo(map);
      } else {
        map.removeLayer(basinLayer);
      }
    });

    document.getElementById('subBasinToggle').addEventListener('change', function () {
      if (this.checked) {
        subBasinLayer.addTo(map);
      } else {
        map.removeLayer(subBasinLayer);
      }
    });

    document.getElementById('provinceToggle').addEventListener('change', function () {
      if (this.checked) {
        provinceLayer.addTo(map);
      } else {
        map.removeLayer(provinceLayer);
      }
    });

    document.getElementById('factoryToggle').addEventListener('change', function () {
      if (this.checked) {
        factoryLayer.addTo(map);
      } else {
        map.removeLayer(factoryLayer);
      }
    });

    document.getElementById('riverToggle').addEventListener('change', function () {
      if (this.checked) {
        riverLayer.addTo(map);
      } else {
        map.removeLayer(riverLayer);
      }
    });

    document.getElementById('waterbodyToggle').addEventListener('change', function () {
      if (this.checked) {
        waterbodyLayer.addTo(map);
      } else {
        map.removeLayer(waterbodyLayer);
      }
    });

    document.getElementById('basinSelect').addEventListener('change', function () {
      filterAndZoomToBasin(this.value);
    });

    document.getElementById('zoomBasinBtn').addEventListener('click', function () {
      var basinThai = document.getElementById('basinSelect').value;
      filterAndZoomToBasin(basinThai);
    });

    document.getElementById('showAllBasinBtn').addEventListener('click', function () {
      showAllBasins();
    });

    // ===============================
    // 11) Layer Control บนแผนที่
    // ===============================
    var overlayMaps = {
      'ขอบเขตลุ่มน้ำหลัก': basinLayer,
      'ขอบเขตลุ่มน้ำย่อย': subBasinLayer,
      'ขอบเขตจังหวัด': provinceLayer,
      'โรงงานอุตสาหกรรม': factoryLayer,
      'เส้นลำน้ำ': riverLayer,
      'แหล่งน้ำ / อุทกวิทยา': waterbodyLayer
    };

    L.control.layers(null, overlayMaps, {
      collapsed: false
    }).addTo(map);
  </script>
</body>
</html>
