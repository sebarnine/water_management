<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ระบบ Web GIS จัดการผังน้ำอีสาน</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      height: 55px;
      background: #0b3558;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 55px);
    }

    .sidebar {
      width: 330px;
      background: #f5f7fa;
      border-right: 1px solid #ddd;
      padding: 15px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
      color: #0b3558;
    }

    .sidebar h4 {
      margin: 16px 0 8px;
      color: #0b3558;
      font-size: 15px;
    }

    .layer-box {
      background: white;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .layer-box label {
      cursor: pointer;
      font-size: 15px;
    }

    .layer-box input {
      margin-right: 8px;
    }

    select {
      width: 100%;
      height: 180px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: #0b3558;
      color: white;
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #222;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.4;
    }

    #map {
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="header">
    ระบบสารสนเทศเพื่อการจัดการผังน้ำอีสาน
  </div>

  <div class="container">
    <div class="sidebar">
      <h3>ข้อมูลพื้นฐาน</h3>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="basinToggle" checked />
          ขอบเขตลุ่มน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" id="provinceToggle" checked />
          ขอบเขตจังหวัด
        </label>

        <h4>กรองจังหวัด</h4>

        <select id="provinceSelect" multiple>
          <option>กำลังโหลดรายชื่อจังหวัด...</option>
        </select>

        <div class="btn-row">
          <button class="btn-primary" id="applyProvinceFilter">
            แสดงจังหวัดที่เลือก
          </button>
          <button class="btn-secondary" id="clearProvinceFilter">
            แสดงทั้งหมด
          </button>
        </div>

        <div class="note">
          กด Ctrl ค้างไว้เพื่อเลือกหลายจังหวัด หรือกด Shift เพื่อเลือกเป็นช่วง
        </div>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          เส้นลำน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          แหล่งน้ำ
        </label>
      </div>

      <div class="layer-box">
        <label>
          <input type="checkbox" disabled />
          พื้นที่ป่าไม้
        </label>
      </div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // ===============================
    // 1) สร้างแผนที่
    // ===============================
    var map = L.map('map').setView([15.5, 103.5], 7);

    var baseMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // ===============================
    // 2) ชั้นข้อมูลขอบเขตลุ่มน้ำ จาก basin.geojson
    // ===============================
    var basinLayer = L.geoJSON(null, {
      style: {
        color: '#d7191c',
        weight: 3,
        opacity: 1,
        fillColor: '#ffffff',
        fillOpacity: 0.08
      },
      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};

        var name =
          props.RBASIN_NT ||
          props.FIRST_RBAS ||
          props.name ||
          props.NAME ||
          props.Name ||
          props.basin_name ||
          props.BASIN_NAME ||
          props.Subbasin ||
          props.SUBBASIN ||
          'ขอบเขตลุ่มน้ำ';

        layer.bindPopup('<b>ขอบเขตลุ่มน้ำ</b><br>' + name);
      }
    });

    fetch('basin.geojson')
      .then(function (response) {
        if (!response.ok) {
          throw new Error('ไม่พบไฟล์ basin.geojson');
        }
        return response.json();
      })
      .then(function (data) {
        basinLayer.addData(data);
        basinLayer.addTo(map);

        if (basinLayer.getBounds().isValid()) {
          map.fitBounds(basinLayer.getBounds());
        }
      })
      .catch(function (error) {
        console.error('โหลดไฟล์ basin.geojson ไม่สำเร็จ:', error);
      });

    // ===============================
    // 3) ชั้นข้อมูลขอบเขตจังหวัด จาก ArcGIS FeatureServer
    // ===============================

    var provinceLayer = L.geoJSON(null, {
      style: {
        color: '#6a1b9a',
        weight: 2,
        opacity: 1,
        fillColor: '#ffffff',
        fillOpacity: 0
      },
      onEachFeature: function (feature, layer) {
        var props = feature.properties || {};
        var name = getProvinceName(props);

        var popupText = '<b>ขอบเขตจังหวัด</b><br>' + name;

        layer.bindPopup(popupText);
      }
    });

    var allProvinceData = null;

    var provinceUrl =
      'https://services1.arcgis.com/jSaRWj2TDlcN1zOC/arcgis/rest/services/Thailand_Province_Boundaries_view/FeatureServer/1/query?' +
      'where=1%3D1&' +
      'outFields=*&' +
      'returnGeometry=true&' +
      'outSR=4326&' +
      'f=geojson';

    fetch(provinceUrl)
      .then(function (response) {
        if (!response.ok) {
          throw new Error('โหลดข้อมูลจังหวัดไม่สำเร็จ');
        }
        return response.json();
      })
      .then(function (data) {
        allProvinceData = data;

        provinceLayer.addData(allProvinceData);
        provinceLayer.addTo(map);

        createProvinceDropdown(allProvinceData);
      })
      .catch(function (error) {
        console.error('โหลดขอบเขตจังหวัดไม่สำเร็จ:', error);
        alert('โหลดขอบเขตจังหวัดไม่สำเร็จ กรุณาตรวจสอบ API');
      });

    // ===============================
    // 4) ฟังก์ชันอ่านชื่อจังหวัด
    // ===============================
    function getProvinceName(props) {
      return (
        props.ADM1_TH ||
        props.ADM1_EN ||
        props.PROV_NAMT ||
        props.PROV_NAME ||
        props.NAME_1 ||
        props.NAME ||
        props.name ||
        props.Province ||
        props.province ||
        props.CHANGWAT_T ||
        props.CHANGWAT_E ||
        'ไม่ทราบชื่อจังหวัด'
      );
    }

    // ===============================
    // 5) สร้าง dropdown รายชื่อจังหวัด
    // ===============================
    function createProvinceDropdown(data) {
      var select = document.getElementById('provinceSelect');
      select.innerHTML = '';

      var provinceNames = [];

      data.features.forEach(function (feature) {
        var props = feature.properties || {};
        var name = getProvinceName(props);

        if (provinceNames.indexOf(name) === -1) {
          provinceNames.push(name);
        }
      });

      provinceNames.sort();

      provinceNames.forEach(function (name) {
        var option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }

    // ===============================
    // 6) กรองจังหวัดตามที่เลือก
    // ===============================
    function applyProvinceFilter() {
      if (!allProvinceData) {
        alert('ข้อมูลจังหวัดยังโหลดไม่เสร็จ');
        return;
      }

      var select = document.getElementById('provinceSelect');
      var selectedNames = Array.from(select.selectedOptions).map(function (option) {
        return option.value;
      });

      provinceLayer.clearLayers();

      if (selectedNames.length === 0) {
        provinceLayer.addData(allProvinceData);
      } else {
        var filteredData = {
          type: 'FeatureCollection',
          features: allProvinceData.features.filter(function (feature) {
            var props = feature.properties || {};
            var name = getProvinceName(props);
            return selectedNames.indexOf(name) !== -1;
          })
        };

        provinceLayer.addData(filteredData);

        if (provinceLayer.getBounds().isValid()) {
          map.fitBounds(provinceLayer.getBounds());
        }
      }

      if (document.getElementById('provinceToggle').checked) {
        provinceLayer.addTo(map);
      }
    }

    // ===============================
    // 7) ล้างตัวกรอง แสดงทุกจังหวัด
    // ===============================
    function clearProvinceFilter() {
      if (!allProvinceData) {
        alert('ข้อมูลจังหวัดยังโหลดไม่เสร็จ');
        return;
      }

      var select = document.getElementById('provinceSelect');

      Array.from(select.options).forEach(function (option) {
        option.selected = false;
      });

      provinceLayer.clearLayers();
      provinceLayer.addData(allProvinceData);

      if (document.getElementById('provinceToggle').checked) {
        provinceLayer.addTo(map);
      }

      if (provinceLayer.getBounds().isValid()) {
        map.fitBounds(provinceLayer.getBounds());
      }
    }

    // ===============================
    // 8) ปุ่มเปิด-ปิดชั้นข้อมูล
    // ===============================
    document.getElementById('basinToggle').addEventListener('change', function () {
      if (this.checked) {
        basinLayer.addTo(map);
      } else {
        map.removeLayer(basinLayer);
      }
    });

    document.getElementById('provinceToggle').addEventListener('change', function () {
      if (this.checked) {
        provinceLayer.addTo(map);
      } else {
        map.removeLayer(provinceLayer);
      }
    });

    document.getElementById('applyProvinceFilter').addEventListener('click', function () {
      applyProvinceFilter();
    });

    document.getElementById('clearProvinceFilter').addEventListener('click', function () {
      clearProvinceFilter();
    });

    // ===============================
    // 9) Layer Control บนแผนที่
    // ===============================
    var overlayMaps = {
      'ขอบเขตลุ่มน้ำ': basinLayer,
      'ขอบเขตจังหวัด': provinceLayer
    };

    L.control.layers(null, overlayMaps, {
      collapsed: false
    }).addTo(map);
  </script>
</body>
</html>
